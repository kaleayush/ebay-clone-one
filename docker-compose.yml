version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ebay-clone-sqlserver
    environment:
      SA_PASSWORD: "${DB_PASSWORD:-YourStrong@Passw0rd}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - ebay-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $${SA_PASSWORD} -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ebay-clone-backend
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${DB_NAME:-EBayCloneDb};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;"
      JwtSettings__Secret: "${JWT_SECRET:-your-super-secret-key-at-least-32-characters-long}"
      JwtSettings__Issuer: "${JWT_ISSUER:-EBayCloneApi}"
      JwtSettings__Audience: "${JWT_AUDIENCE:-EBayCloneFrontend}"
      JwtSettings__ExpiryMinutes: "${JWT_EXPIRY_MINUTES:-15}"
      JwtSettings__RefreshExpiryDays: "${JWT_REFRESH_EXPIRY_DAYS:-7}"
      CorsSettings__AllowedOrigins: "${FRONTEND_URL:-http://localhost:5173}"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - ebay-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${BACKEND_URL:-http://localhost:5000}"
    container_name: ebay-clone-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ebay-network

volumes:
  sqlserver_data:

networks:
  ebay-network:
    driver: bridge